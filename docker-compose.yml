version: '3.8'
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=file:/app/data/mansil.db
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=15m
      - CORS_ORIGINS=http://localhost:3000
      - PORT=3001
      - NODE_ENV=production
    volumes:
      - db-data:/app/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db-data:
